<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOUR OPS · PPIC &amp; WH 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --void:#020408;--deep:#040a12;--panel:#08101a;--surface:#0c1620;--lift:#101e2c;
  --rim:rgba(0,200,255,0.07);--rim2:rgba(0,200,255,0.16);--rim3:rgba(0,200,255,0.28);
  --cyan:#00c8ff;--amber:#ffb020;--green:#00ff88;--red:#ff3d5a;
  --purple:#b06eff;--pink:#f472b6;--orange:#fb923c;--teal:#00d4b4;
  --muted:rgba(180,220,255,0.32);--ghost:rgba(180,220,255,0.1);--text:#c8dff0;--text2:#7889b2;
  --mono:'Space Mono',monospace;--body:'Space Grotesk',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{background:var(--void);color:var(--text);font-family:var(--body);font-size:14px;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--rim2);border-radius:4px}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.025) 2px,rgba(0,0,0,0.025) 4px);pointer-events:none;z-index:900}
.ambient{position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 65% 45% at 10% 15%,rgba(0,200,255,0.055),transparent 60%),
             radial-gradient(ellipse 55% 40% at 90% 80%,rgba(176,110,255,0.04),transparent 60%),
             radial-gradient(ellipse 45% 30% at 60% 40%,rgba(255,176,32,0.018),transparent 70%)}

.wrap{position:relative;z-index:1;max-width:680px;margin:0 auto;padding:0 13px 60px}

/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 0 0;border-bottom:1px solid var(--rim2);margin-bottom:20px;position:relative}
.topbar::after{content:'';position:absolute;bottom:-1px;left:0;width:160px;height:1px;background:linear-gradient(90deg,var(--cyan),transparent)}
.tb-left{padding-bottom:12px}
.tb-eye{font-family:var(--mono);font-size:8px;letter-spacing:3px;color:var(--cyan);text-transform:uppercase;opacity:.65;margin-bottom:4px}
.tb-title{font-family:var(--mono);font-size:16px;font-weight:700;color:#fff;letter-spacing:-.5px;line-height:1}
.tb-title em{color:var(--cyan);font-style:normal}
.tb-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;padding-bottom:12px}
.live-badge{display:flex;align-items:center;gap:5px;background:rgba(0,255,136,0.07);border:1px solid rgba(0,255,136,0.18);border-radius:3px;padding:3px 9px;font-family:var(--mono);font-size:8px;color:var(--green);letter-spacing:1.5px;text-transform:uppercase}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 7px var(--green);animation:blink 1.8s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
.btn-sync{font-family:var(--mono);font-size:9px;letter-spacing:1px;color:var(--cyan);background:var(--rim);border:1px solid var(--rim2);border-radius:3px;padding:5px 12px;cursor:pointer;transition:all .2s;text-transform:uppercase}
.btn-sync:hover{background:rgba(0,200,255,0.12);border-color:var(--cyan)}
.btn-sync:active{opacity:.75}
.sync-txt{font-family:var(--mono);font-size:8px;color:var(--ghost)}

/* ── SEC LABEL ── */
.sec{font-family:var(--mono);font-size:8px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;display:flex;align-items:center;gap:10px;margin:22px 0 10px}
.sec::before{content:'//';color:var(--cyan);opacity:.4;margin-right:2px}
.sec::after{content:'';flex:1;height:1px;background:var(--rim2)}

/* ── ALERTS ── */
.alert{display:flex;align-items:flex-start;gap:9px;padding:9px 13px;border-radius:4px;font-family:var(--mono);font-size:11px;line-height:1.55;margin-bottom:7px;animation:rise .4s ease both}
.alert:last-child{margin-bottom:0}
.al-r{background:rgba(255,61,90,0.07);border:1px solid rgba(255,61,90,0.2);color:#ff8fa0}
.al-a{background:rgba(255,176,32,0.07);border:1px solid rgba(255,176,32,0.2);color:#ffd070}
.al-g{background:rgba(0,255,136,0.07);border:1px solid rgba(0,255,136,0.18);color:#80ffbb}
.al-c{background:rgba(0,200,255,0.07);border:1px solid rgba(0,200,255,0.16);color:#80e8ff}
.al-b{font-weight:700;margin-right:3px}
.al-icon{flex-shrink:0;font-size:12px;margin-top:1px}

/* ── CMD CENTER ── */
.cmd{background:var(--panel);border:1px solid var(--rim2);border-radius:8px;overflow:hidden;margin-bottom:10px;position:relative}
.cmd::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--cyan),var(--purple),transparent)}

.cmd-top{display:flex;align-items:stretch}
.ring-col{flex:0 0 112px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:18px 8px;border-right:1px solid var(--rim)}
.ring-eye{font-family:var(--mono);font-size:7px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:7px}
.ring-sub{font-family:var(--mono);font-size:8px;color:var(--muted);margin-top:5px}
.ring-sub b{color:var(--cyan)}

.vitals{flex:1;display:grid;grid-template-columns:repeat(3,1fr)}
.vt{padding:14px 12px;border-right:1px solid var(--rim);display:flex;flex-direction:column;gap:3px;cursor:pointer;transition:background .15s;position:relative;overflow:hidden;-webkit-tap-highlight-color:transparent}
.vt:last-child{border-right:none}
.vt:hover{background:rgba(0,200,255,0.035)}
.vt.active{background:rgba(0,200,255,0.065)}
.vt.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--cyan)}
.vt-eye{font-family:var(--mono);font-size:7px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase}
.vt-n{font-family:var(--mono);font-size:24px;font-weight:700;line-height:1}
.vt-s{font-size:9px;color:var(--muted)}
.vt-arr{position:absolute;bottom:4px;right:6px;font-size:6px;color:var(--ghost)}
.vc .vt-n{color:var(--cyan)} .va .vt-n{color:var(--amber)} .vr .vt-n{color:var(--red)}
.vg .vt-n{color:var(--green)} .vp .vt-n{color:var(--purple)} .vt2 .vt-n{color:var(--teal)}

/* CMD PROGRESS */
.cmd-bar{display:flex;align-items:center;gap:12px;padding:11px 16px;border-top:1px solid var(--rim)}
.bar-col{flex:1}
.bar-labels{display:flex;justify-content:space-between;font-family:var(--mono);font-size:8px;color:var(--muted);margin-bottom:4px}
.bar-track{height:5px;background:rgba(255,255,255,0.04);border-radius:2px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:2px;transition:width .95s cubic-bezier(.4,0,.2,1);position:relative}
.bar-fill.cyan{background:linear-gradient(90deg,#003f55,var(--cyan))}
.bar-fill.cyan::after{content:'';position:absolute;right:0;top:-1px;bottom:-1px;width:3px;background:white;box-shadow:0 0 7px var(--cyan)}
.cmd-pct-num{font-family:var(--mono);font-size:26px;font-weight:700;color:var(--cyan);line-height:1;flex-shrink:0;text-shadow:0 0 18px rgba(0,200,255,.35)}
.cmd-pct-num small{font-size:12px;color:var(--muted)}

.cmd-pills{display:flex;gap:5px;flex-wrap:wrap;padding:9px 16px;border-top:1px solid var(--rim)}
.pill{font-family:var(--mono);font-size:8px;letter-spacing:.5px;padding:3px 8px;border-radius:3px;text-transform:uppercase;font-weight:700}
.pg{background:rgba(0,255,136,.07);border:1px solid rgba(0,255,136,.18);color:var(--green)}
.pr{background:rgba(255,61,90,.07);border:1px solid rgba(255,61,90,.18);color:var(--red)}
.pa{background:rgba(255,176,32,.07);border:1px solid rgba(255,176,32,.18);color:var(--amber)}
.pc{background:rgba(0,200,255,.07);border:1px solid rgba(0,200,255,.18);color:var(--cyan)}
.pp{background:var(--ghost);border:1px solid rgba(255,255,255,.06);color:var(--muted)}

/* ── DRILL ── */
.drill{max-height:0;overflow:hidden;transition:max-height .38s cubic-bezier(.4,0,.2,1),opacity .28s;opacity:0}
.drill.open{max-height:700px;opacity:1;margin-bottom:8px}
.drill-in{background:var(--surface);border:1px solid var(--rim2);border-radius:7px;margin-top:8px}
.drill-hdr{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid var(--rim);font-family:var(--mono);font-size:10px;font-weight:700}
.drill-close{background:none;border:none;color:var(--muted);font-size:17px;cursor:pointer;line-height:1;padding:0 2px}
.drill-body{padding:12px 14px}

/* ── STATUS TRIO ── */
.trio{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.st{background:var(--panel);border:1px solid var(--rim);border-radius:6px;padding:12px 10px;text-align:center;position:relative;overflow:hidden}
.st-bar{position:absolute;bottom:0;left:0;height:3px;border-radius:2px}
.st-n{font-family:var(--mono);font-size:22px;font-weight:700;line-height:1}
.st-l{font-family:var(--mono);font-size:7px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-top:3px}
.st-p{font-family:var(--mono);font-size:10px;font-weight:700;margin-top:2px}
.stg .st-n,.stg .st-p{color:var(--green)} .stg .st-bar{background:var(--green)}
.sta .st-n,.sta .st-p{color:var(--amber)} .sta .st-bar{background:var(--amber)}
.str .st-n,.str .st-p{color:var(--red)}   .str .st-bar{background:var(--red)}

/* ── PANEL ── */
.panel{background:var(--panel);border:1px solid var(--rim);border-radius:8px;overflow:hidden;margin-bottom:10px}
.panel::before{display:none}
.panel.line-cyan{border-top:2px solid rgba(0,200,255,.4)}
.panel.line-green{border-top:2px solid rgba(0,255,136,.35)}
.panel.line-amber{border-top:2px solid rgba(255,176,32,.35)}
.panel.line-purple{border-top:2px solid rgba(176,110,255,.35)}
.panel.line-teal{border-top:2px solid rgba(0,212,180,.35)}
.panel.line-red{border-top:2px solid rgba(255,61,90,.35)}
.p-hdr{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:1px solid var(--rim)}
.p-title{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--text);letter-spacing:.4px}
.p-sub{font-family:var(--mono);font-size:9px;color:var(--muted)}
.p-body{padding:13px 14px}
.p-body.np{padding:0}

/* ── BARS ── */
.br{margin-bottom:9px}
.br:last-child{margin-bottom:0}
.br-meta{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;gap:8px}
.br-n{font-size:12px;color:var(--text);flex:1;line-height:1.4}
.br-v{font-family:var(--mono);font-size:10px;font-weight:700;white-space:nowrap}
.br-track{height:4px;background:rgba(255,255,255,0.04);border-radius:2px;overflow:hidden}
.br-fill{height:100%;border-radius:2px;transition:width .8s cubic-bezier(.4,0,.2,1)}

/* ── TOP 3 ── */
.tgl-list{display:flex;flex-direction:column;gap:7px}
.tgl-row{display:flex;align-items:center;gap:12px;padding:11px 13px;background:var(--surface);border:1px solid var(--rim);border-radius:6px;transition:border-color .2s}
.tgl-row:first-child{border-color:rgba(255,176,32,.28)}
.tgl-rank{font-family:var(--mono);font-size:17px;font-weight:700;min-width:22px;color:var(--muted)}
.tgl-row:nth-child(1) .tgl-rank{color:var(--amber);text-shadow:0 0 10px rgba(255,176,32,.4)}
.tgl-row:nth-child(2) .tgl-rank{color:rgba(180,220,255,.45)}
.tgl-row:nth-child(3) .tgl-rank{color:rgba(251,146,60,.5)}
.tgl-info{flex:1}
.tgl-name{font-size:12px;font-weight:600;color:var(--text);margin-bottom:4px}
.tgl-row:first-child .tgl-name{color:var(--amber)}
.tgl-bt{height:3px;background:rgba(255,255,255,0.04);border-radius:2px;overflow:hidden}
.tgl-bf{height:100%;border-radius:2px;transition:width .8s ease}
.tgl-c{font-family:var(--mono);font-size:14px;font-weight:700;flex-shrink:0}

/* ── MINI CELLS ── */
.mg2{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.mg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
.mc{background:var(--surface);border:1px solid var(--rim);border-radius:5px;padding:10px;text-align:center}
.mc-n{font-family:var(--mono);font-size:19px;font-weight:700;line-height:1}
.mc-l{font-family:var(--mono);font-size:7px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-top:3px;line-height:1.5}

/* ── BUS VIS ── */
.bus-item{display:flex;align-items:center;gap:9px;padding:6px 11px;background:var(--surface);border:1px solid var(--rim);border-radius:4px;margin-bottom:5px}
.bus-item:last-child{margin-bottom:0}
.bus-lbl{font-family:var(--mono);font-size:9px;color:var(--cyan);min-width:44px}
.bus-track{flex:1;height:6px;background:rgba(0,200,255,0.06);border-radius:3px;overflow:hidden}
.bus-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#003a54,var(--cyan));transition:width .8s}
.bus-cnt{font-family:var(--mono);font-size:9px;color:var(--muted);min-width:34px;text-align:right}

/* ── ACCORDION ── */
.acc-item{border-radius:7px;margin-bottom:7px;overflow:hidden}
.acc-h{display:flex;align-items:center;gap:9px;padding:11px 13px;cursor:pointer;user-select:none;transition:background .15s}
.acc-h:active{opacity:.82}
.acc-chev{font-size:9px;color:var(--muted);transition:transform .25s;flex-shrink:0;margin-left:auto}
.acc-h.open .acc-chev{transform:rotate(180deg)}
.acc-b{display:none;padding:0 13px 13px}
.acc-b.open{display:block}
.acc-purple{background:rgba(176,110,255,0.06);border:1px solid rgba(176,110,255,0.15)}.acc-purple .acc-h{background:rgba(176,110,255,0.07)}
.acc-cyan{background:rgba(0,200,255,0.05);border:1px solid rgba(0,200,255,0.13)}.acc-cyan .acc-h{background:rgba(0,200,255,0.07)}
.acc-orange{background:rgba(251,146,60,0.06);border:1px solid rgba(251,146,60,0.15)}.acc-orange .acc-h{background:rgba(251,146,60,0.08)}
.acc-indigo{background:rgba(99,102,241,0.06);border:1px solid rgba(99,102,241,0.15)}.acc-indigo .acc-h{background:rgba(99,102,241,0.07)}
.acc-pink{background:rgba(236,72,153,0.05);border:1px solid rgba(236,72,153,0.13)}.acc-pink .acc-h{background:rgba(236,72,153,0.06)}
.acc-ghost{background:rgba(255,255,255,0.02);border:1px solid var(--rim)}

/* ROOM BLOCK */
.room-block{background:rgba(99,102,241,0.07);border:1px solid rgba(99,102,241,0.15);border-radius:7px;padding:10px;margin-bottom:7px}
.room-block:last-child{margin-bottom:0}
.room-person{display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.room-person:last-child{border-bottom:none}

/* ── SIM ── */
.sim-tabs{display:flex;gap:0;border-bottom:1px solid var(--rim);margin-bottom:14px}
.stab{padding:7px 18px;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;border:none;background:transparent;border-bottom:2px solid transparent;transition:all .15s;font-family:var(--body)}
.stab.active{color:var(--cyan);border-bottom-color:var(--cyan)}
.stab-body{display:none}
.stab-body.active{display:block}
.sim-row{display:flex;align-items:center;gap:10px;margin-bottom:13px}
.sim-row label{font-size:11px;color:var(--text2);flex:1;font-weight:500}
.sim-inp{background:var(--surface);border:1px solid var(--rim2);border-radius:6px;padding:7px 11px;color:var(--text);font-family:var(--mono);font-size:13px;font-weight:700;width:80px;outline:none;text-align:center}
.sim-inp:focus{border-color:var(--cyan)}
.sim-result{background:var(--surface);border:1px solid var(--rim);border-radius:6px;padding:11px 13px;margin-bottom:8px}
.sim-rrow{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.sim-rrow:last-child{border-bottom:none}
.sim-rl{font-size:11px;color:var(--text2)}
.sim-rv{font-family:var(--mono);font-size:12px;font-weight:700}
.sim-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:9px}
.sim-cell{background:var(--surface);border:1px solid var(--rim);border-radius:6px;padding:9px;text-align:center}
.sim-cell-n{font-family:var(--mono);font-size:16px;font-weight:700;line-height:1}
.sim-cell-l{font-size:8px;color:var(--muted);margin-top:3px;line-height:1.4}

/* ── LEG ── */
.leg{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.leg:last-child{margin-bottom:0}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.leg-n{font-size:12px;color:var(--text);flex:1}
.leg-v{font-family:var(--mono);font-size:12px;font-weight:700}
.leg-p{font-family:var(--mono);font-size:9px;color:var(--muted);margin-left:3px}

/* ── BADGE ── */
.bdg{display:inline-block;padding:2px 7px;border-radius:3px;font-family:var(--mono);font-size:8px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap}
.bg{background:rgba(0,255,136,.07);border:1px solid rgba(0,255,136,.18);color:var(--green)}
.br2{background:rgba(255,61,90,.07);border:1px solid rgba(255,61,90,.18);color:var(--red)}
.ba{background:rgba(255,176,32,.07);border:1px solid rgba(255,176,32,.18);color:var(--amber)}
.bc{background:rgba(0,200,255,.07);border:1px solid rgba(0,200,255,.18);color:var(--cyan)}
.bp{background:rgba(176,110,255,.07);border:1px solid rgba(176,110,255,.18);color:var(--purple)}

/* ── FILTER TABLE ── */
.fi-row{display:flex;gap:7px;margin-bottom:10px;flex-wrap:wrap}
.fi{background:var(--surface);border:1px solid var(--rim2);border-radius:5px;padding:8px 11px;color:var(--text);font-family:var(--body);font-size:12px;outline:none;flex:1;min-width:110px}
.fi:focus{border-color:var(--cyan)}
.fi::placeholder{color:var(--muted)}
select.fi{cursor:pointer;background:var(--surface)}
.tbl-wrap{overflow-x:auto}
table.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{padding:8px 12px;text-align:left;font-family:var(--mono);font-size:7.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--rim2);background:var(--deep);white-space:nowrap}
.tbl td{padding:8px 12px;border-bottom:1px solid rgba(255,255,255,0.025);color:rgba(200,223,240,.65);vertical-align:middle}
.tbl tr:hover td{background:rgba(0,200,255,0.025)}
.tbl td.bold{color:var(--text);font-weight:600}
.tbl td.mono{font-family:var(--mono);font-size:10px}
.tbl td.r{text-align:right}
.tbl-empty{padding:28px;text-align:center;color:var(--muted);font-style:italic;font-size:11px}

/* MISC */
.chart-wrap{position:relative;height:190px}
.divider{height:1px;background:var(--rim);margin:11px 0}
.empty-s{text-align:center;color:var(--muted);font-size:11px;padding:16px;font-style:italic}

/* LOADING */
.loading{text-align:center;padding:80px 20px;color:var(--muted)}
.spin{width:28px;height:28px;margin:0 auto 12px;border:2px solid rgba(0,200,255,.1);border-top-color:var(--cyan);border-radius:50%;animation:rot .7s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}
.load-txt{font-family:var(--mono);font-size:10px;letter-spacing:2px;text-transform:uppercase}

/* STAGGER */
.sg>*{opacity:0;transform:translateY(7px);animation:rise .4s ease both}
.sg>*:nth-child(1){animation-delay:.04s}.sg>*:nth-child(2){animation-delay:.09s}
.sg>*:nth-child(3){animation-delay:.13s}.sg>*:nth-child(4){animation-delay:.17s}
.sg>*:nth-child(5){animation-delay:.21s}.sg>*:nth-child(6){animation-delay:.25s}

function donutSVG(segs,sz=110){
  const r=38,cx=50,cy=50,c=2*Math.PI*r;let off=0,paths='';
  segs.forEach(s=>{const d=c*(s.pct/100),g=c-d;paths+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.color}" stroke-width="10" stroke-dasharray="${d.toFixed(1)} ${g.toFixed(1)}" stroke-dashoffset="${(-(off*c/100)).toFixed(1)}" transform="rotate(-90 ${cx} ${cy})"/>`;off+=s.pct;});
  return`<svg width="${sz}" height="${sz}" viewBox="0 0 100 100">${paths}<text x="50" y="44" text-anchor="middle" fill="white" font-size="14" font-weight="700" font-family="Space Mono,monospace">${segs[0]?.val||''}</text><text x="50" y="57" text-anchor="middle" fill="rgba(180,220,255,0.3)" font-size="7" font-family="Space Mono,monospace">${segs[0]?.sub||''}</text></svg>`;
}

/* ── CALC ── */
function calcSummary(data){
  const ikut=data.filter(r=>!r[32]||r[32]==='Ya'||r[32]==='');
  const tidak=data.filter(r=>r[32]==='Tidak');
  const totalIsi=data.length,totalIkut=ikut.length,totalTidak=tidak.length,belum=Math.max(0,GRAND-totalIsi);
  const totalPax=sum(ikut.map(r=>r[11])),totalDewasa=sum(ikut.map(r=>r[9])),totalAnak=sum(ikut.map(r=>r[10]));
  const anakR={balita:0,anak:0};
  ikut.forEach(r=>{for(let i=0;i<8;i++){const n=r[12+i*2],u=parseInt(r[13+i*2]);if(n&&n!=='-'&&!isNaN(u)){if(u<5)anakR.balita++;else if(u<=11)anakR.anak++;}}});
  const paxDewasaActual=totalPax-anakR.anak-anakR.balita;
  const naikBus=ikut.filter(r=>r[28]==='Ikut Bus Panitia').length;
  const pesertaBus=sum(ikut.filter(r=>r[28]==='Ikut Bus Panitia').map(r=>parseInt(r[11])||1));
  const kendaraan=ikut.filter(r=>r[28]==='Kendaraan Sendiri').length;
  const perTanggal=cnt(ikut.map(r=>r[5])),perKehadiran=cnt(ikut.map(r=>r[6]));
  const perSection=cnt(ikut.map(r=>r[3]));
  const perLengan=cnt(ikut.map(r=>getLengan(r)).filter(v=>v&&v!=='-'));
  const perKaos={};
  ikut.forEach(r=>{const l=getLengan(r),s=getSize(r);if(l&&s){const k=l+' '+s;perKaos[k]=(perKaos[k]||0)+1;}});
  return{data,dataIkut:ikut,dataTidak:tidak,totalIsi,totalIkut,totalTidak,belum,totalPax,totalDewasa,totalAnak,paxDewasaActual,paxAnak:anakR.anak,paxBalita:anakR.balita,naikBus,pesertaBus,kendaraan,perTanggal,perKehadiran,perSection,perLengan,perKaos};
}

function calcBus(pesertaBus,cap){
  const n=Math.ceil(pesertaBus/cap)||0,total=n*cap,kosong=total-pesertaBus,occ=p(pesertaBus,total||1);
  const perBus=Array.from({length:n},(_,i)=>{const t=i<Math.floor(pesertaBus/cap)?cap:(pesertaBus%cap||cap);return{id:i+1,terisi:t,kosong:cap-t};});
  return{busDibut:n,totalKursi:total,kosong,occupancy:occ,perBus,kapasitas:cap};
}

function calcHotel(totalPax,paxPerKamar){
  const n=Math.ceil(totalPax/paxPerKamar)||0,total=n*paxPerKamar,kosong=total-totalPax,occ=p(totalPax,total||1);
  const estimates=[200000,250000,300000,350000,400000].map(c=>({harga:c,total:c*n}));
  return{kamarDibut:n,totalSlot:total,slotKosong:kosong,occupancy:occ,estimates,paxPerKamar};
}

function hitungKamar(data){
  const keluarga=data.filter(r=>parseInt(r[9])>1||parseInt(r[10])>0);
  const soloFixed=data.filter(r=>r[1].trim().toLowerCase()===SOLO&&parseInt(r[9])<=1&&parseInt(r[10])===0);
  const sharingPool=data.filter(r=>r[1].trim().toLowerCase()!==SOLO&&parseInt(r[9])<=1&&parseInt(r[10])===0);
  const bySec={};sharingPool.forEach(r=>{const s=r[3]||'?';if(!bySec[s])bySec[s]=[];bySec[s].push(r);});
  const rooms=[],overflow=[];
  Object.entries(bySec).forEach(([,ms])=>{let i=0;while(i+ROOM_DEF<=ms.length){rooms.push({label:ms[0][3],same:true,members:ms.slice(i,i+ROOM_DEF)});i+=ROOM_DEF;}while(i<ms.length){overflow.push(ms[i]);i++;}});
  for(let i=0;i<overflow.length;i+=ROOM_DEF){const ch=overflow.slice(i,i+ROOM_DEF);rooms.push({label:[...new Set(ch.map(r=>r[3]))].join(' + '),same:false,members:ch});}
  const breakdown={};keluarga.forEach(r=>{const d=parseInt(r[9])||1,a=parseInt(r[10])||0,k=`${d} Dws${a>0?` + ${a} Anak`:''}`;breakdown[k]=(breakdown[k]||0)+1;});
  return{keluarga,soloFixed,sharingPool,sharingRooms:rooms,kamarKeluarga:keluarga.length,kamarSolo:soloFixed.length,kamarSharing:rooms.length,totalKamar:keluarga.length+soloFixed.length+rooms.length,kosongSharing:rooms.length*ROOM_DEF-sharingPool.length,breakdown};
}

function generateAlert(s){
  const alerts=[],pctRes=p(s.totalIsi,GRAND);
  if(pctRes<50) alerts.push({t:'al-r',i:'⚡',m:`<span class="al-b">KRITIS:</span> Hanya ${pctRes}% respons. Kejar ${s.belum} orang.`});
  else if(pctRes<75) alerts.push({t:'al-a',i:'△',m:`<span class="al-b">PERHATIAN:</span> ${s.belum} karyawan belum konfirmasi (${100-pctRes}%).`});
  else if(s.belum>0) alerts.push({t:'al-c',i:'◎',m:`<span class="al-b">INFO:</span> ${s.belum} pending. Progress ${pctRes}% — hampir selesai!`});
  else alerts.push({t:'al-g',i:'✓',m:`<span class="al-b">ALL CLEAR:</span> Semua ${GRAND} karyawan sudah konfirmasi! 🎉`});
  if(s.totalTidak>0) alerts.push({t:'al-a',i:'△',m:`<span class="al-b">${s.totalTidak} declined.</span> Budget adjustment possible.`});
  const b=calcBus(s.pesertaBus,window._busCap||BUS_DEF);
  if(b.kosong<5&&b.kosong>=0) alerts.push({t:'al-r',i:'🚌',m:`<span class="al-b">BUS HAMPIR PENUH:</span> Sisa ${b.kosong} kursi dari ${b.busDibut} bus.`});
  else if(b.kosong>30) alerts.push({t:'al-c',i:'🚌',m:`<span class="al-b">BUS:</span> ${b.kosong} kursi kosong dari ${b.busDibut} bus.`});
  return alerts;
}

window._rawData=[];
function applyFilter(){
  const q=(document.getElementById('fQ')?.value||'').toLowerCase();
  const sec=document.getElementById('fSec')?.value||'';
  const stat=document.getElementById('fStat')?.value||'';
  const data=window._rawData;
  const sudahSet=new Set(data.map(r=>nn(r[2])));
  let filtered=[];
  if(stat==='belum'){
    filtered=MASTER.filter(k=>{
      const m=!sudahSet.has(nn(k.noreg)),sm=!sec||k.sec===sec,qm=!q||k.name.toLowerCase().includes(q)||k.sec.toLowerCase().includes(q);
      return m&&sm&&qm;
    }).map(k=>({_belum:true,nama:k.name,section:k.sec,ikut:'belum',tanggal:'—',pax:'—',transport:'—',kaos:'—'}));
  } else {
    filtered=data.filter(r=>{
      const nm=(r[1]||'').toLowerCase(),sc=r[3]||'';
      const iku=!r[32]||r[32]==='Ya'||r[32]==='';
      const sm=!sec||sc===sec;
      const stm=!stat||(stat==='ikut'&&iku)||(stat==='tidak'&&r[32]==='Tidak');
      const qm=!q||nm.includes(q)||sc.toLowerCase().includes(q)||String(r[2]).includes(q);
      return sm&&stm&&qm;
    }).map(r=>({nama:r[1],noreg:r[2],section:r[3],ikut:!r[32]||r[32]==='Ya'||r[32]===''?'Ya':'Tidak',tanggal:(r[5]||'').replace('2026','').trim(),pax:r[11],transport:r[28],kaos:kaosLbl(r),r}));
  }
  const tbody=document.getElementById('tblBody');
  document.getElementById('tblCount').textContent=filtered.length+' data';
  if(!filtered.length){tbody.innerHTML=`<tr><td colspan="6" class="tbl-empty">Tidak ada data</td></tr>`;return;}
  tbody.innerHTML=filtered.map(row=>{
    if(row._belum)return`<tr><td class="bold">${row.nama}</td><td style="font-size:10px;color:var(--muted)">${ss(row.section)}</td><td><span class="bdg ba">BELUM</span></td><td>—</td><td class="r mono">—</td><td>—</td></tr>`;
    const bdg=row.ikut==='Ya'?`<span class="bdg bg">IKUT</span>`:`<span class="bdg br2">TIDAK</span>`;
    return`<tr><td class="bold">${row.nama}</td><td style="font-size:10px;color:var(--muted)">${ss(row.section)}</td><td>${bdg}</td><td class="mono" style="color:var(--amber)">${row.tanggal}</td><td class="r mono">${row.pax}</td><td style="font-size:10px;color:var(--muted)">${row.kaos}</td></tr>`;
  }).join('');
}

      <div class="tgl-list">
        ${Object.entries(s.perTanggal).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([tgl,cnt],i)=>{
          const mx=Object.values(s.perTanggal).reduce((a,b)=>Math.max(a,b),1);
          const clrs=['var(--amber)','rgba(180,220,255,.45)','rgba(251,146,60,.5)'];
          return`<div class="tgl-row"><div class="tgl-rank">#${i+1}</div><div class="tgl-info"><div class="tgl-name">${tgl}</div><div class="tgl-bt"><div class="tgl-bf" style="width:${p(cnt,mx)}%;background:${clrs[i]}"></div></div></div><div class="tgl-c" style="color:${clrs[i]}">${cnt}</div></div>`;
        }).join('')||`<div class="empty-s">Belum ada data</div>`}
      </div>
    </div>
  </div>

  <!-- BREAKDOWN PAX -->
  <div class="sec">Komposisi Peserta</div>
  <div class="panel line-cyan">
    <div class="p-hdr"><span class="p-title">◈ DEWASA / ANAK / BALITA</span><span class="p-sub">${s.totalPax} total pax</span></div>
    <div class="p-body">
      <div style="display:flex;gap:16px;align-items:center">
        ${donutSVG([{val:s.paxDewasaActual,sub:'dewasa',pct:p(s.paxDewasaActual,s.totalPax||1),color:'#00c8ff'},{pct:p(s.paxAnak,s.totalPax||1),color:'#ffb020'},{pct:p(s.paxBalita,s.totalPax||1),color:'#f472b6'}],108)}
        <div style="flex:1">
          ${[['Dewasa ≥12',s.paxDewasaActual,'#00c8ff'],['Anak 5–11',s.paxAnak,'#ffb020'],['Balita <5',s.paxBalita,'#f472b6']].map(([l,v,c])=>`<div class="leg"><div class="leg-dot" style="background:${c}"></div><span class="leg-n">${l}</span><span class="leg-v" style="color:${c}">${v}</span><span class="leg-p">${p(v,s.totalPax||1)}%</span></div>`).join('')}
          <div class="divider"></div>
          ${[['Naik Bus',s.naikBus,'#00c8ff'],['Kend. Sendiri',s.kendaraan,'#ffb020']].map(([l,v,c])=>`<div class="leg"><div class="leg-dot" style="background:${c}"></div><span class="leg-n">${l}</span><span class="leg-v" style="color:${c}">${v}</span><span class="leg-p">${p(v,s.totalIkut||1)}%</span></div>`).join('')}
        </div>
      </div>
      <div class="divider"></div>
      <div style="font-family:var(--mono);font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:9px">Per Section</div>
      ${Object.entries(s.perSection).sort((a,b)=>b[1]-a[1]).map(([sec,val],i)=>`
        <div class="br"><div class="br-meta"><span class="br-n">${ss(sec)}</span><span class="br-v" style="color:${CLR[i%CLR.length]}">${val}</span></div>
        <div class="br-track"><div class="br-fill" style="width:${p(val,Math.max(...Object.values(s.perSection),1))}%;background:${CLR[i%CLR.length]}"></div></div></div>`).join('')}
    </div>
  </div>

  <!-- LOGISTIK BUS + CHART -->
  <div class="sec">Logistik Transportasi</div>
  <div class="panel line-cyan">
    <div class="p-hdr"><span class="p-title">◈ BUS vs KENDARAAN SENDIRI</span></div>
    <div class="p-body">
      <div class="mg3" style="margin-bottom:14px">
        <div class="mc"><div class="mc-n" style="color:var(--cyan)">${busN}</div><div class="mc-l">Bus Dibutuhkan</div></div>
        <div class="mc"><div class="mc-n" style="color:var(--green)">${s.pesertaBus}</div><div class="mc-l">Peserta Bus</div></div>
        <div class="mc"><div class="mc-n" style="color:var(--amber)">${s.kendaraan}</div><div class="mc-l">Kend. Sendiri</div></div>
      </div>
      <div class="chart-wrap"><canvas id="busChart"></canvas></div>
    </div>
  </div>

  <!-- SIMULASI OPERASIONAL -->
  <div class="sec">Simulasi Operasional</div>
  <div class="panel line-amber">
    <div class="p-hdr"><span class="p-title">◈ KALKULATOR OPERASIONAL</span></div>
    <div class="p-body">
      <div class="sim-tabs">
        <button class="stab active" data-g="sim" data-t="bus" onclick="swTab('sim','bus')">🚌 Bus</button>
        <button class="stab" data-g="sim" data-t="hotel" onclick="swTab('sim','hotel')">🏨 Hotel</button>
      </div>
      <div class="stab-body active" data-g="sim" data-t="bus">
        <div class="sim-row"><label>Kapasitas per bus</label><input type="number" id="busCapInput" class="sim-inp" value="${BUS_DEF}" min="10" max="100" oninput="renderBusSim()"><span style="font-size:10px;color:var(--muted)">kursi</span></div>
        <div id="busSimResult"></div>
      </div>
      <div class="stab-body" data-g="sim" data-t="hotel">
        <div class="sim-row"><label>Pax per kamar</label><input type="number" id="roomCapInput" class="sim-inp" value="${ROOM_DEF}" min="1" max="8" oninput="renderHotelSim()"><span style="font-size:10px;color:var(--muted)">orang</span></div>
        <div id="hotelSimResult"></div>
      </div>
    </div>
  </div>

  <!-- AKOMODASI -->
  <div class="sec">Akomodasi Hotel</div>
  <div class="panel line-teal">
    <div class="p-hdr"><span class="p-title">◈ KEBUTUHAN KAMAR</span><span class="p-sub">${km.totalKamar} kamar</span></div>
    <div class="p-body">
      <div class="mg2" style="margin-bottom:12px">
        <div class="mc" style="border-color:rgba(0,212,180,.25)"><div class="mc-n" style="color:var(--teal)">${km.totalKamar}</div><div class="mc-l">Total Kamar</div></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
          <div class="mc" style="border-color:rgba(251,146,60,.25)"><div class="mc-n" style="color:var(--orange)">${km.kamarKeluarga}</div><div class="mc-l">Keluarga</div></div>
          <div class="mc" style="border-color:rgba(244,114,182,.2)"><div class="mc-n" style="color:var(--pink)">${km.kamarSolo}</div><div class="mc-l">Solo</div></div>
          <div class="mc" style="grid-column:span 2;border-color:rgba(99,102,241,.25)"><div class="mc-n" style="color:var(--purple)">${km.kamarSharing}</div><div class="mc-l">Sharing · ${km.kosongSharing} slot kosong</div></div>
        </div>
      </div>
      <div style="height:8px;border-radius:4px;overflow:hidden;display:flex;margin-bottom:14px">
        <div style="width:${p(km.kamarKeluarga,km.totalKamar)}%;background:var(--orange)"></div>
        <div style="width:${p(km.kamarSolo,km.totalKamar)}%;background:var(--pink)"></div>
        <div style="width:${p(km.kamarSharing,km.totalKamar)}%;background:var(--purple)"></div>
      </div>
      ${acc('km-k','acc-orange','👨‍👩‍👧','Kamar Keluarga',`${km.kamarKeluarga} kamar`,`
        ${Object.entries(km.breakdown).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`<div class="br"><div class="br-meta"><span class="br-n">${k}</span><span class="br-v" style="color:var(--orange)">${v}</span></div><div class="br-track"><div class="br-fill" style="width:${p(v,km.kamarKeluarga)}%;background:var(--orange)"></div></div></div>`).join('')||'<div class="empty-s">Belum ada</div>'}
        <div class="divider"></div>
        ${km.keluarga.map((r,i)=>`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.03)"><span style="font-family:var(--mono);font-size:8px;color:var(--muted);width:14px">${i+1}</span><div style="flex:1"><div style="font-size:12px;font-weight:600">${r[1]}</div><div style="font-size:9px;color:var(--muted)">${ss(r[3])}</div></div><span class="bdg" style="background:rgba(251,146,60,.12);border:1px solid rgba(251,146,60,.25);color:var(--orange)">${r[9]} dws · ${r[10]} anak</span></div>`).join('')||'<div class="empty-s">Belum ada</div>'}`)}
      ${km.kamarSolo>0?acc('km-s','acc-pink','👩','Kamar Solo',`${km.kamarSolo} kamar`,km.soloFixed.map(r=>`<div style="padding:8px;background:rgba(244,114,182,0.07);border:1px solid rgba(244,114,182,0.13);border-radius:6px;margin-bottom:5px"><div style="font-size:12px;font-weight:600">${r[1]}</div><div style="font-size:9px;color:var(--muted)">${r[3]}</div></div>`).join('')):''}
      ${acc('km-sh','acc-indigo','👥','Kamar Sharing',`${km.kamarSharing} kamar`,
        km.sharingRooms.map((room,i)=>{
          const isi=room.members.length,kosong=ROOM_DEF-isi,full=kosong===0;
          return`<div class="room-block" style="${!room.same?'border-color:rgba(255,176,32,.22)':''}">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;flex-wrap:wrap;gap:4px">
              <span style="font-family:var(--mono);font-size:10px;font-weight:700;color:var(--purple)">KAMAR ${i+1}</span>
              <div style="display:flex;gap:3px">
                <span class="bdg ${!room.same?'ba':'bp'}">${room.same?'1-SEC':'LINTAS'}</span>
                <span class="bdg ${full?'bg':'ba'}">${isi}/${ROOM_DEF}${full?' FULL':` · ${kosong} kosong`}</span>
              </div>
            </div>
            <div style="font-size:9px;color:var(--muted);margin-bottom:6px;font-style:italic">${room.label}</div>
            <div class="br-track" style="margin-bottom:6px;height:3px"><div class="br-fill" style="width:${p(isi,ROOM_DEF)}%;background:${full?'var(--green)':'var(--purple)'}"></div></div>
            ${room.members.map((r,j)=>`<div class="room-person"><span style="font-family:var(--mono);font-size:8px;color:var(--muted);width:12px">${j+1}</span><span style="font-size:12px;font-weight:600;flex:1">${r[1]}</span><span style="font-size:9px;color:var(--muted)">${ss(r[3])}</span></div>`).join('')}
            ${kosong>0?Array.from({length:kosong},()=>`<div style="padding:3px 0"><span style="font-size:9px;color:rgba(255,255,255,0.1);font-style:italic">— slot kosong</span></div>`).join(''):''}
          </div>`;}).join('')||'<div class="empty-s">Belum ada</div>')}
    </div>
  </div>

  <!-- KAOS -->
  <div class="sec">Kaos</div>
  ${acc('kaos','acc-cyan','👕','Ukuran & Model Kaos',`${s.perLengan['Lengan Pendek']||0} pendek · ${s.perLengan['Lengan Panjang']||0} panjang`,`
    <div class="mg2" style="margin-bottom:12px">
      <div class="mc" style="border-color:rgba(255,61,90,.2)"><div class="mc-n" style="color:var(--red)">${s.perLengan['Lengan Pendek']||0}</div><div class="mc-l">Lengan Pendek · ${p(s.perLengan['Lengan Pendek']||0,s.totalIkut)}%</div></div>
      <div class="mc" style="border-color:rgba(176,110,255,.2)"><div class="mc-n" style="color:var(--purple)">${s.perLengan['Lengan Panjang']||0}</div><div class="mc-l">Lengan Panjang · ${p(s.perLengan['Lengan Panjang']||0,s.totalIkut)}%</div></div>
    </div>
    <div class="divider"></div>
    ${(()=>{const mx=Math.max(...Object.values(s.perKaos),1);return Object.entries(s.perKaos).sort((a,b)=>b[1]-a[1]).map(([k,v],i)=>`<div class="br"><div class="br-meta"><span class="br-n">${k}</span><span class="br-v" style="color:${CLR[i%CLR.length]}">${v} <span style="opacity:.5;font-size:9px">(${p(v,s.totalIkut)}%)</span></span></div><div class="br-track"><div class="br-fill" style="width:${p(v,mx)}%;background:${CLR[i%CLR.length]}"></div></div></div>`).join('')||'<div class="empty-s">Belum ada data</div>';})()}`)}

  <!-- FILTER & TABLE -->
  <div class="sec">Data Terminal</div>
  <div class="panel">
    <div class="p-hdr"><span class="p-title">◈ PARTICIPANT RECORDS</span><span class="p-sub" id="tblCount"></span></div>
    <div class="p-body">
      <div class="fi-row">
        <input class="fi" id="fQ" placeholder="⌕  cari nama / noreg..." oninput="applyFilter()" style="flex:2">
        <select class="fi" id="fStat" onchange="applyFilter()"><option value="">All Status</option><option value="ikut">Ikut</option><option value="tidak">Tidak Ikut</option><option value="belum">Belum Isi</option></select>
        <select class="fi" id="fSec" onchange="applyFilter()"><option value="">All Sections</option>${sections.map(s=>`<option value="${s}">${ss(s)}</option>`).join('')}</select>
      </div>
    </div>
    <div class="p-body np">
      <div class="tbl-wrap">
        <table class="tbl">
          <thead><tr><th>Nama</th><th>Section</th><th>Status</th><th>Tgl</th><th class="r">Pax</th><th>Kaos</th></tr></thead>
          <tbody id="tblBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- SEMUA PENDAFTAR -->
  <div class="sec">Semua Pendaftar</div>
  ${acc('all','acc-ghost','📋','Daftar Lengkap',`${data.length} pendaftar · tap untuk expand`,
    data.map((r,i)=>{
      const iku=!r[32]||r[32]==='Ya'||r[32]==='';
      const ki=kamarMap[r[1]]||{t:'k',l:'—'};
      return`<div style="background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,${iku?'.06':'.03'});border-radius:6px;padding:9px;margin-bottom:5px${!iku?';opacity:.45':''}">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
          <div style="font-size:12px;font-weight:700">${i+1}. ${r[1]}</div>
          <span class="bdg ${iku?'bg':'br2'}">${iku?'IKUT':'TIDAK'}</span>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:2px 8px;font-size:9px">
          <div style="color:var(--muted)">${ss(r[3])}</div>
          <div style="color:var(--amber);font-family:var(--mono)">${(r[5]||'').replace('2026','').trim()}</div>
          <div style="color:var(--text2)">${r[28]==='Ikut Bus Panitia'?'🚌 Bus':'🚗 Sendiri'}</div>
          <div style="font-family:var(--mono);font-weight:700;color:var(--amber)">${r[11]} org</div>
          <div style="color:var(--text2)">${kaosLbl(r)}</div>
          <span class="bdg" style="${kBStyle[ki.t]};font-size:8px">${ki.l}</span>
        </div>
      </div>`;}).join(''))}

  </div>`;

  // Init
  setTimeout(()=>{
    const ctx=document.getElementById('busChart');
    if(ctx){if(_chartBus)_chartBus.destroy();
      _chartBus=new Chart(ctx,{type:'doughnut',data:{labels:['Naik Bus','Kendaraan Sendiri'],datasets:[{data:[s.naikBus,s.kendaraan],backgroundColor:['rgba(0,200,255,.12)','rgba(255,176,32,.12)'],borderColor:['rgba(0,200,255,.8)','rgba(255,176,32,.8)'],borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,cutout:'58%',plugins:{legend:{position:'right',labels:{color:'rgba(180,220,255,.45)',font:{family:'Space Mono',size:10},boxWidth:8,padding:10}},tooltip:{callbacks:{label:c=>` ${c.label}: ${c.raw} orang`}}}}});}
    renderBusSim();renderHotelSim();applyFilter();
  },80);
}

function swTab(g,t){
  document.querySelectorAll(`.stab[data-g="${g}"]`).forEach(x=>x.classList.remove('active'));
  document.querySelectorAll(`.stab-body[data-g="${g}"]`).forEach(x=>x.classList.remove('active'));
  document.querySelector(`.stab[data-g="${g}"][data-t="${t}"]`).classList.add('active');
  document.querySelector(`.stab-body[data-g="${g}"][data-t="${t}"]`).classList.add('active');
}

async function loadData(){
  document.getElementById('root').innerHTML=`<div class="loading"><div class="spin"></div><div class="load-txt">Fetching data...</div></div>`;
  try{
    const res=await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`);
    const txt=await res.text();
    const json=JSON.parse(txt.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
    const rows=json.table.rows||[];
    if(!rows.length){document.getElementById('root').innerHTML=`<div class="loading"><div class="load-txt">📭 Belum ada data pendaftar.</div></div>`;return;}
    render(rows.map(r=>r.c.map(c=>c?(c.f||c.v||'-'):'-')));
    document.getElementById('syncTxt').textContent=new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  }catch(e){document.getElementById('root').innerHTML=`<div class="loading"><div class="load-txt" style="color:var(--red)">⚠ ${e.message}</div></div>`;}
}
loadData();
</script>
</body>
</html>

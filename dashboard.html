<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Operational Dashboard · Tour PPIC &amp; WH 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#07091a;--bg2:#0d1128;--bg3:#121630;--card:#131729;--card2:#181e35;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#e2e8f8;--text2:#8896b8;--text3:#4a5680;
  --blue:#4d8ef8;--green:#22d07a;--red:#f05252;--amber:#f5a623;
  --teal:#00d4b4;--purple:#a78bfa;--pink:#f472b6;--orange:#fb923c;
  --font:'Poppins',sans-serif;--r:14px;--r2:10px;--r3:20px
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;min-height:100vh;padding:0}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* ── WRAP ── */
.wrap{max-width:640px;margin:0 auto;padding:14px 12px 40px}

/* ── HEADER ── */
.hdr{text-align:center;padding:18px 0 14px}
.hdr-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(77,142,248,0.12);border:1px solid rgba(77,142,248,0.25);border-radius:20px;padding:4px 14px;font-size:10px;font-weight:700;color:var(--blue);letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px}
.hdr-title{font-size:22px;font-weight:900;line-height:1.25;background:linear-gradient(135deg,#f7c948,#ff6b35,#e94560,#a855f7,#4d8ef8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px}
.hdr-sub{font-size:11px;color:var(--text3);margin-bottom:12px}
.hdr-btns{display:flex;gap:8px}
.btn-refresh{flex:1;background:linear-gradient(90deg,#a855f7,#4d8ef8);border:none;color:white;padding:10px;border-radius:var(--r3);font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font)}
.btn-refresh:active{opacity:.85}
.hdr-sync{font-size:10px;color:var(--text3);margin-top:6px}

/* ── ALERT BANNER ── */
.alert-wrap{margin-bottom:12px}
.alert{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;border-radius:var(--r2);margin-bottom:7px;font-size:12px;line-height:1.5}
.alert:last-child{margin-bottom:0}
.alert-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.alert-red{background:rgba(240,82,82,0.1);border:1px solid rgba(240,82,82,0.25)}
.alert-amber{background:rgba(245,166,35,0.1);border:1px solid rgba(245,166,35,0.25)}
.alert-blue{background:rgba(77,142,248,0.1);border:1px solid rgba(77,142,248,0.25)}
.alert-green{background:rgba(34,208,122,0.1);border:1px solid rgba(34,208,122,0.25)}
.alert-red .at{color:var(--red)} .alert-amber .at{color:var(--amber)}
.alert-blue .at{color:var(--blue)} .alert-green .at{color:var(--green)}
.at{font-weight:800;margin-right:4px}

/* ── SEC DIVIDER ── */
.sec{font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--text3);text-align:center;padding:6px 0 8px;display:flex;align-items:center;gap:10px}
.sec::before,.sec::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── CARD ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.card.c-blue::before{background:linear-gradient(90deg,var(--blue),transparent)}
.card.c-green::before{background:linear-gradient(90deg,var(--green),transparent)}
.card.c-amber::before{background:linear-gradient(90deg,var(--amber),transparent)}
.card.c-purple::before{background:linear-gradient(90deg,var(--purple),transparent)}
.card.c-teal::before{background:linear-gradient(90deg,var(--teal),transparent)}
.card.c-red::before{background:linear-gradient(90deg,var(--red),transparent)}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-title{font-size:12px;font-weight:800;color:var(--text);display:flex;align-items:center;gap:6px}
.card-sub{font-size:11px;color:var(--text3)}

/* ── HERO SUMMARY ── */
.hero-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.hero-card{background:var(--card2);border:1px solid var(--border);border-radius:var(--r2);padding:12px 10px;text-align:center;cursor:pointer;transition:all .15s;position:relative}
.hero-card:active{transform:scale(.96)}
.hero-card.active{border-color:white;background:rgba(255,255,255,0.08)}
.hero-num{font-size:26px;font-weight:900;line-height:1;margin-bottom:3px}
.hero-lbl{font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--text3);line-height:1.3}
.hero-sub{font-size:9px;color:var(--text3);margin-top:2px}
.hero-arr{position:absolute;bottom:4px;right:6px;font-size:8px;color:var(--text3)}

/* RING PROGRESS */
.ring-row{display:flex;gap:14px;align-items:center;margin-bottom:12px}
.ring-info{flex:1}
.ring-pct-big{font-size:42px;font-weight:900;color:var(--green);line-height:1}
.ring-desc{font-size:11px;color:var(--text2);margin-top:4px;line-height:1.6}
.ring-pills{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.pill{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700}
.pill-g{background:rgba(34,208,122,0.12);border:1px solid rgba(34,208,122,0.25);color:var(--green)}
.pill-r{background:rgba(240,82,82,0.12);border:1px solid rgba(240,82,82,0.25);color:var(--red)}
.pill-a{background:rgba(245,166,35,0.12);border:1px solid rgba(245,166,35,0.25);color:var(--amber)}
.pill-b{background:rgba(77,142,248,0.12);border:1px solid rgba(77,142,248,0.25);color:var(--blue)}
.pill-p{background:rgba(167,139,250,0.12);border:1px solid rgba(167,139,250,0.25);color:var(--purple)}

/* ── DRILL PANEL ── */
.drill-wrap{overflow:hidden;max-height:0;transition:max-height .35s ease,opacity .3s;opacity:0;margin-bottom:0}
.drill-wrap.open{max-height:800px;opacity:1;margin-bottom:12px}
.drill-inner{background:var(--card2);border:1px solid var(--border2);border-radius:var(--r);padding:14px}
.drill-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.drill-title{font-size:13px;font-weight:800}
.drill-close{background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer;line-height:1;padding:0 2px}

/* ── STATUS BANDS ── */
.status-row{display:flex;gap:8px;margin-bottom:12px}
.status-band{flex:1;border-radius:var(--r2);padding:12px 10px;text-align:center;position:relative;overflow:hidden}
.sb-fill{position:absolute;bottom:0;left:0;height:3px;border-radius:2px}
.sb-num{font-size:22px;font-weight:900;line-height:1}
.sb-lbl{font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:rgba(255,255,255,0.5);margin-top:3px}
.sb-pct{font-size:10px;font-weight:700;margin-top:2px}
.sb-confirm{background:rgba(34,208,122,0.1);border:1px solid rgba(34,208,122,0.2)}
.sb-confirm .sb-num,.sb-confirm .sb-pct{color:var(--green)}
.sb-confirm .sb-fill{background:var(--green)}
.sb-pending{background:rgba(245,166,35,0.1);border:1px solid rgba(245,166,35,0.2)}
.sb-pending .sb-num,.sb-pending .sb-pct{color:var(--amber)}
.sb-pending .sb-fill{background:var(--amber)}
.sb-no{background:rgba(240,82,82,0.1);border:1px solid rgba(240,82,82,0.2)}
.sb-no .sb-num,.sb-no .sb-pct{color:var(--red)}
.sb-no .sb-fill{background:var(--red)}

/* ── DONUT CHART ── */
.donut-wrap{display:flex;gap:16px;align-items:center}
.donut-legend{flex:1}
.leg-item{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.leg-label{font-size:12px;color:var(--text2);flex:1}
.leg-val{font-size:12px;font-weight:700}
.leg-pct{font-size:10px;color:var(--text3);margin-left:4px}

/* ── BAR CHART ── */
.bar-wrap{margin-bottom:9px}
.bar-wrap:last-child{margin-bottom:0}
.bar-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;gap:8px}
.bl{font-size:12px;color:var(--text2);flex:1;line-height:1.4}
.bv{font-size:12px;font-weight:800;white-space:nowrap}
.bar-track{background:rgba(255,255,255,0.06);border-radius:4px;height:7px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .7s cubic-bezier(.4,0,.2,1)}

/* ── SIMULATION ── */
.sim-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:16px}
.stab{padding:8px 20px;font-size:12px;font-weight:700;color:var(--text3);cursor:pointer;border:none;background:transparent;border-bottom:2px solid transparent;transition:all .15s;font-family:var(--font)}
.stab.active{color:var(--blue);border-bottom-color:var(--blue)}
.stab-body{display:none}
.stab-body.active{display:block}
.sim-input-row{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.sim-input-row label{font-size:11px;color:var(--text2);flex:1;font-weight:600}
.sim-input{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:8px 12px;color:var(--text);font-family:var(--font);font-size:14px;font-weight:700;width:90px;outline:none;text-align:center}
.sim-input:focus{border-color:var(--blue)}
.sim-result{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:12px 14px;margin-bottom:8px}
.sim-result-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.sim-result-row:last-child{border-bottom:none}
.sim-rl{font-size:12px;color:var(--text2)}
.sim-rv{font-size:13px;font-weight:800}
.sim-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
.sim-cell{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center}
.sim-cell-num{font-size:18px;font-weight:900;line-height:1}
.sim-cell-lbl{font-size:9px;color:var(--text3);margin-top:2px;line-height:1.4}

/* ── FILTER BAR ── */
.filter-bar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.f-input{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:8px 12px;color:var(--text);font-family:var(--font);font-size:12px;outline:none;flex:1;min-width:120px}
.f-input:focus{border-color:var(--blue)}
.f-input::placeholder{color:var(--text3)}
select.f-input{cursor:pointer}
.f-count{font-size:11px;color:var(--text3);align-self:center;white-space:nowrap;font-weight:600}

/* ── DATA TABLE ── */
.tbl-wrap{overflow-x:auto}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{padding:9px 12px;text-align:left;color:var(--text3);font-weight:600;font-family:'Poppins',sans-serif;font-size:10px;letter-spacing:.3px;text-transform:uppercase;border-bottom:1px solid var(--border);background:var(--bg3);white-space:nowrap}
.tbl td{padding:9px 12px;border-bottom:1px solid rgba(255,255,255,0.03);color:var(--text2);vertical-align:middle}
.tbl tr:hover td{background:rgba(255,255,255,0.02)}
.tbl td.bold{color:var(--text);font-weight:600}
.tbl td.mono{font-family:monospace;font-size:11px}
.tbl td.r{text-align:right}
.tbl-empty{padding:32px;text-align:center;color:var(--text3);font-style:italic;font-size:12px}

/* ── BADGE ── */
.badge{display:inline-block;padding:2px 8px;border-radius:5px;font-size:10px;font-weight:700;white-space:nowrap}
.bdg-g{background:rgba(34,208,122,0.12);color:var(--green)}
.bdg-r{background:rgba(240,82,82,0.12);color:var(--red)}
.bdg-a{background:rgba(245,166,35,0.12);color:var(--amber)}
.bdg-b{background:rgba(77,142,248,0.12);color:var(--blue)}
.bdg-p{background:rgba(167,139,250,0.12);color:var(--purple)}

/* ── ACCORDION ── */
.acc-item{border-radius:var(--r2);margin-bottom:8px;overflow:hidden}
.acc-h{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;user-select:none;transition:background .15s}
.acc-h:active{opacity:.85}
.acc-chev{font-size:10px;color:var(--text3);transition:transform .25s;flex-shrink:0;margin-left:auto}
.acc-h.open .acc-chev{transform:rotate(180deg)}
.acc-b{display:none;padding:0 14px 14px}
.acc-b.open{display:block}
.sec-acc{background:rgba(167,139,250,0.07);border:1px solid rgba(167,139,250,0.18)}
.sec-acc .acc-h{background:rgba(167,139,250,0.08)}
.orang-acc{background:rgba(255,255,255,0.02);border:1px solid var(--border)}
.bus-acc{background:rgba(77,142,248,0.07);border:1px solid rgba(77,142,248,0.18)}
.bus-acc .acc-h{background:rgba(77,142,248,0.1)}
.km-k-acc{background:rgba(251,146,60,0.07);border:1px solid rgba(251,146,60,0.18)}
.km-k-acc .acc-h{background:rgba(251,146,60,0.1)}
.km-sh-acc{background:rgba(99,102,241,0.07);border:1px solid rgba(99,102,241,0.18)}
.km-sh-acc .acc-h{background:rgba(99,102,241,0.09)}
.km-s-acc{background:rgba(236,72,153,0.06);border:1px solid rgba(236,72,153,0.15)}
.km-s-acc .acc-h{background:rgba(236,72,153,0.08)}

/* ROOM BLOCK */
.room-block{background:rgba(99,102,241,0.09);border:1px solid rgba(99,102,241,0.18);border-radius:8px;padding:10px;margin-bottom:7px}
.room-person{display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.room-person:last-child{border-bottom:none}

/* LOADING */
.loading{text-align:center;padding:70px 20px;color:var(--text3)}
.spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,0.08);border-top-color:var(--purple);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}

.divider{height:1px;background:var(--border);margin:12px 0}
.empty{text-align:center;color:var(--text3);font-size:11px;padding:16px;font-style:italic}
</style>
</head>

const sum   = arr => arr.reduce((a,b)=>a+(parseFloat(b)||0),0);
const pct   = (a,b) => b>0 ? Math.round(a/b*100) : 0;
const cnt   = arr => { const m={}; arr.forEach(v=>{m[v]=(m[v]||0)+1}); return m; };
const normN = v => String(v).replace(/^0+/,'').trim();
const shortS= s => s.replace(/Section|Sec\.?/gi,'').replace(/Plant #(\d)/gi,'P$1').trim().slice(0,24);

const getLengan = r => r[29]&&r[29].includes('/')?r[29].split('/')[0].trim():r[29]||'';
const getSize   = r => {
  if(r[29]&&r[29].includes('/')){const m=r[29].match(/Size\s*(\S+)/i)||r[29].match(/\/\s*(\S+)/);return m?m[1].trim():'';}
  return r[30]||'';
};
const kaosLabel = r => {
  if(r[29]&&r[29].includes('/'))return r[29].replace(/Size\s*/i,'').replace('/','/ ').replace(/\s+/g,' ');
  if(r[29]&&r[30]&&r[30]!=='-')return`${r[29]} / ${r[30]}`;
  return r[29]||r[30]||'-';
};

function calcSummary(data) {
  const dataIkut  = data.filter(r=>!r[32]||r[32]==="Ya"||r[32]==="");
  const dataTidak = data.filter(r=>r[32]==="Tidak");
  const totalIsi  = data.length;
  const totalIkut = dataIkut.length;
  const totalTidak= dataTidak.length;
  const belum     = GRAND - totalIsi;

  const totalPax    = sum(dataIkut.map(r=>r[11]));
  const totalDewasa = sum(dataIkut.map(r=>r[9]));
  const totalAnak   = sum(dataIkut.map(r=>r[10]));

  // Breakdown usia anak
  const anakR={"balita":0,"anak":0,"dewasa_muda":0};
  dataIkut.forEach(r=>{
    for(let i=0;i<8;i++){
      const n=r[12+i*2], u=parseInt(r[13+i*2]);
      if(n&&n!=="-"&&!isNaN(u)){
        if(u<5) anakR.balita++;
        else if(u<=11) anakR.anak++;
        else anakR.dewasa_muda++;
      }
    }
  });
  // dewasa = totalDewasa (dari form, sudah termasuk yg >=12)
  // breakdown lebih akurat: dewasa from form - subtract anak 13-17 overlap → simplify: use form data
  const paxDewasa = totalDewasa;
  const paxAnak   = anakR.anak;
  const paxBalita = anakR.balita;
  // re-calc dewasa proper: total pax - anak semua umur
  const paxDewasaActual = totalPax - paxAnak - paxBalita;

  const naikBus   = dataIkut.filter(r=>r[28]==="Ikut Bus Panitia").length;
  const pesertaBus= sum(dataIkut.filter(r=>r[28]==="Ikut Bus Panitia").map(r=>parseInt(r[11])||1));
  const kendaraanSendiri = dataIkut.filter(r=>r[28]==="Kendaraan Sendiri").length;

  const perSection = cnt(dataIkut.map(r=>r[3]));
  const perTanggal = cnt(dataIkut.map(r=>r[5]));
  const perKehadiran = cnt(dataIkut.map(r=>r[6]));
  const perLengan  = cnt(dataIkut.map(r=>getLengan(r)).filter(v=>v&&v!=='-'));
  const perKaos    = {};
  dataIkut.forEach(r=>{const l=getLengan(r),s=getSize(r);if(l&&s){const k=l+' '+s;perKaos[k]=(perKaos[k]||0)+1;}});

  return {
    data, dataIkut, dataTidak, totalIsi, totalIkut, totalTidak, belum,
    totalPax, totalDewasa, totalAnak,
    paxDewasaActual, paxAnak, paxBalita,
    naikBus, pesertaBus, kendaraanSendiri,
    perSection, perTanggal, perKehadiran, perLengan, perKaos
  };
}

function calcBus(pesertaBus, kapasitas) {
  const busDibut  = Math.ceil(pesertaBus / kapasitas) || 0;
  const totalKursi= busDibut * kapasitas;
  const kosong    = totalKursi - pesertaBus;
  const occupancy = pct(pesertaBus, totalKursi);
  const perBus    = Array.from({length:busDibut},(_,i)=>{
    const terisi = i < Math.floor(pesertaBus/kapasitas) ? kapasitas : (pesertaBus%kapasitas||kapasitas);
    return { id:i+1, terisi, kosong:kapasitas-terisi };
  });
  return { busDibut, totalKursi, kosong, occupancy, perBus, kapasitas };
}

function calcHotel(totalPax, paxPerKamar) {
  const kamarDibut = Math.ceil(totalPax / paxPerKamar) || 0;
  const totalSlot  = kamarDibut * paxPerKamar;
  const slotKosong = totalSlot - totalPax;
  const occupancy  = pct(totalPax, totalSlot);
  const costPerKamar = [200000, 250000, 300000, 350000, 400000];
  const estimates  = costPerKamar.map(c=>({harga:c, total:c*kamarDibut}));
  return { kamarDibut, totalSlot, slotKosong, occupancy, estimates, paxPerKamar };
}

function generateAlert(s) {
  const alerts = [];
  const pctRes = pct(s.totalIsi, GRAND);

  if(pctRes < 50) alerts.push({type:'red', icon:'🔴', msg:`<span class="at">KRITIS:</span> Hanya ${pctRes}% karyawan yang sudah respons. Segera kejar ${s.belum} orang yang belum konfirmasi.`});
  else if(pctRes < 75) alerts.push({type:'amber', icon:'🟡', msg:`<span class="at">PERHATIAN:</span> ${s.belum} karyawan belum respons (${100-pctRes}%). Deadline pendaftaran mendekat.`});
  else if(s.belum > 0) alerts.push({type:'blue', icon:'🔵', msg:`<span class="at">INFO:</span> ${s.belum} karyawan belum konfirmasi. Progress ${pctRes}% — hampir selesai!`});
  else alerts.push({type:'green', icon:'🟢', msg:`<span class="at">SELESAI:</span> Semua ${GRAND} karyawan sudah konfirmasi! 🎉`});

  if(s.totalTidak > 0) alerts.push({type:'amber', icon:'⚠️', msg:`<span class="at">TIDAK IKUT:</span> ${s.totalTidak} karyawan konfirmasi tidak hadir. Anggaran bisa disesuaikan.`});

  const busInfo = calcBus(s.pesertaBus, window._busCap||BUS_DEF);
  if(busInfo.kosong < 5 && busInfo.kosong >= 0) alerts.push({type:'red', icon:'🚌', msg:`<span class="at">BUS HAMPIR PENUH:</span> Sisa ${busInfo.kosong} kursi dari ${busInfo.busDibut} bus. Pertimbangkan tambah armada.`});
  else if(busInfo.kosong > 30) alerts.push({type:'blue', icon:'🚌', msg:`<span class="at">BUS:</span> ${busInfo.kosong} kursi masih kosong dari ${busInfo.busDibut} bus. Bisa dioptimalkan.`});

  const hotelInfo = calcHotel(s.totalPax, window._roomCap||ROOM_DEF);
  if(hotelInfo.occupancy > 95) alerts.push({type:'amber', icon:'🏨', msg:`<span class="at">HOTEL PENUH:</span> Occupancy ${hotelInfo.occupancy}% — hampir tidak ada ruang. Perlu konfirmasi ekstra dengan hotel.`});

  return alerts;
}

function hitungKamar(data) {
  const keluarga   = data.filter(r=>parseInt(r[9])>1||parseInt(r[10])>0);
  const soloFixed  = data.filter(r=>r[1].trim().toLowerCase()===SOLO&&parseInt(r[9])<=1&&parseInt(r[10])===0);
  const sharingPool= data.filter(r=>r[1].trim().toLowerCase()!==SOLO&&parseInt(r[9])<=1&&parseInt(r[10])===0);
  const bySection  = {};
  sharingPool.forEach(r=>{const s=r[3]||"?";if(!bySection[s])bySection[s]=[];bySection[s].push(r);});
  const sharingRooms=[],overflow=[];
  Object.entries(bySection).forEach(([,ms])=>{
    let i=0;
    while(i+ROOM_DEF<=ms.length){sharingRooms.push({label:ms[0][3],same:true,members:ms.slice(i,i+ROOM_DEF)});i+=ROOM_DEF;}
    while(i<ms.length){overflow.push(ms[i]);i++;}
  });
  for(let i=0;i<overflow.length;i+=ROOM_DEF){
    const ch=overflow.slice(i,i+ROOM_DEF);
    sharingRooms.push({label:[...new Set(ch.map(r=>r[3]))].join(" + "),same:false,members:ch});
  }
  const breakdown={};
  keluarga.forEach(r=>{const d=parseInt(r[9])||1,a=parseInt(r[10])||0,k=`${d} Dws${a>0?` + ${a} Anak`:''}`;breakdown[k]=(breakdown[k]||0)+1;});
  return{keluarga,soloFixed,sharingPool,sharingRooms,
    kamarKeluarga:keluarga.length,kamarSolo:soloFixed.length,kamarSharing:sharingRooms.length,
    totalKamar:keluarga.length+soloFixed.length+sharingRooms.length,
    kosongSharing:sharingRooms.length*ROOM_DEF-sharingPool.length,breakdown};
}

let _activeDrill = '';
function openDrill(key) {
  const panel = document.getElementById('drill-'+key);
  if(!panel) return;
  if(_activeDrill===key){
    panel.classList.remove('open');
    _activeDrill='';
    document.querySelectorAll('.hero-card').forEach(c=>c.classList.remove('active'));
    return;
  }
  // Close any open drill
  document.querySelectorAll('.drill-wrap').forEach(p=>p.classList.remove('open'));
  document.querySelectorAll('.hero-card').forEach(c=>c.classList.remove('active'));
  _activeDrill=key;
  panel.classList.add('open');
  const card=document.getElementById('hc-'+key);
  if(card)card.classList.add('active');
  panel.scrollIntoView({behavior:'smooth',block:'nearest'});
}

  document.querySelector(`.stab-body[data-group="${group}"][data-tab="${tab}"]`).classList.add('active');
}

// ── Donut SVG ──
function donutSVG(segments, size=100) {
  const r=38, cx=50, cy=50, circ=2*Math.PI*r;
  let offset=0;
  let paths='';
  segments.forEach(s=>{
    const dash=circ*(s.pct/100), gap=circ-dash;
    paths+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.color}" stroke-width="11"
      stroke-dasharray="${dash.toFixed(1)} ${gap.toFixed(1)}"
      stroke-dashoffset="${(-offset*circ/100).toFixed(1)}"
      transform="rotate(-90 ${cx} ${cy})"/>`;
    offset+=s.pct;
  });
  return `<svg width="${size}" height="${size}" viewBox="0 0 100 100">${paths}
    <text x="50" y="46" text-anchor="middle" fill="white" font-size="14" font-weight="900" font-family="Poppins,sans-serif">${segments[0]?.val||''}</text>
    <text x="50" y="58" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-size="7" font-family="Poppins,sans-serif">${segments[0]?.sub||''}</text>
  </svg>`;
}

  const q    = (document.getElementById('searchName')?.value||'').toLowerCase();
  const sec  = document.getElementById('filterSec')?.value||'';
  const stat = document.getElementById('filterStatus')?.value||'';
  const data = window._rawData;
  const sudahNikSet = new Set(data.map(r=>normN(r[2])));

  let filtered = [];

  if(stat==='belum') {
    filtered = MASTER.filter(k=>{
      const match = !sudahNikSet.has(normN(k.noreg));
      const secMatch = !sec||k.sec===sec;
      const qMatch = !q||k.name.toLowerCase().includes(q)||k.sec.toLowerCase().includes(q);
      return match&&secMatch&&qMatch;
    }).map(k=>['—',k.name,'—',k.sec,'—','—','—','—','—','—','—','—','—','—','—','—','—','—','—','—','—','—','—','—','—','—','—','—','—','—','—','—','belum']);
  } else {
    filtered = data.filter(r=>{
      const name = (r[1]||'').toLowerCase();
      const section = r[3]||'';
      const ikut = !r[32]||r[32]==="Ya"||r[32]==="";
      const statusMatch = !stat || (stat==='ikut'&&ikut) || (stat==='tidak'&&r[32]==="Tidak");
      const secMatch = !sec||section===sec;
      const qMatch = !q||name.includes(q)||section.toLowerCase().includes(q);
      return statusMatch&&secMatch&&qMatch;
    });
    // Sort: urutan section sesuai TARGETS, lalu nama alphabetical
    const SECT_ORDER=Object.keys(TARGETS);
    filtered.sort((a,b)=>{
      if(Array.isArray(a))return 0; // belum rows skip
      const si=SECT_ORDER.indexOf(a[3]||''),sj=SECT_ORDER.indexOf(b[3]||'');
      if(si!==sj)return(si<0?999:si)-(sj<0?999:sj);
      return(a[1]||'').localeCompare(b[1]||'','id');
    });
  }

  const tbody = document.getElementById('tblBody');
  const counter = document.getElementById('tblCount');
  if(counter) counter.textContent = `${filtered.length} data`;

  if(!filtered.length){
    tbody.innerHTML=`<tr><td colspan="6" class="tbl-empty">Tidak ada data yang cocok</td></tr>`;
    return;
  }

  const bStyle = {k:'background:rgba(251,146,60,0.18);border:1px solid rgba(251,146,60,0.35);color:#fb923c',s:'background:rgba(236,72,153,0.18);border:1px solid rgba(236,72,153,0.35);color:#f9a8d4',sh:'background:rgba(99,102,241,0.18);border:1px solid rgba(99,102,241,0.35);color:#a5b4fc'};
  const km = hitungKamar(window._rawData.filter(r=>!r[32]||r[32]==="Ya"||r[32]===""));

  km.keluarga.forEach(r=>{kamarMap[r[1]]={tipe:'k',lbl:'Keluarga'};});
  km.soloFixed.forEach(r=>{kamarMap[r[1]]={tipe:'s',lbl:'Solo'};});
  km.sharingRooms.forEach((room,i)=>{room.members.forEach(r=>{kamarMap[r[1]]={tipe:'sh',lbl:`Sharing ${i+1}`};});});

  tbody.innerHTML = filtered.map((r,i)=>{
    const isIkut = !r[32]||r[32]==="Ya"||r[32]==="";
    const isBelum = r[32]==='belum';
    const ki = kamarMap[r[1]]||{tipe:'k',lbl:'—'};
    const statusBadge = isBelum
      ? `<span class="badge bdg-a">Belum</span>`
      : isIkut
        ? `<span class="badge bdg-g">Ikut</span>`
        : `<span class="badge bdg-r">Tidak</span>`;
    return `<tr>
      <td class="bold" style="font-size:11px">${r[1]}</td>
      <td style="font-size:10px;color:var(--text3)">${shortS(r[3])}</td>
      <td>${statusBadge}</td>
      <td class="mono" style="font-size:10px;color:#f5a623">${isBelum?'—':r[5].replace('2026','').trim()}</td>
      <td class="r mono">${isBelum?'—':r[11]}</td>
      <td>${isBelum?'—':`<span class="badge" style="${ki.tipe!=='k'?bStyle[ki.tipe]:'font-size:10px;color:var(--text3)'}">${ki.lbl}</span>`}</td>
    </tr>`;
  }).join('');
}

// ═══════════════════════════════════════════════════════════
//  LOAD DATA
// ═══════════════════════════════════════════════════════════
async function loadData() {
  document.getElementById("mainContent").innerHTML =
    `<div class="loading"><div class="spinner"></div>Memuat data dari Google Sheets...</div>`;
  try {
    const res = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`);
    const txt = await res.text();
    const json = JSON.parse(txt.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
    const rows = json.table.rows||[];
    if(!rows.length){
      document.getElementById("mainContent").innerHTML =
        `<div class="loading">📭 Belum ada data pendaftar.</div>`;
      return;
    }
    render(rows.map(r=>r.c.map(c=>c?(c.f||c.v||"-"):"-")));
    document.getElementById("lastSync").textContent =
      "Diperbarui: " + new Date().toLocaleTimeString("id-ID");
  } catch(e) {
    document.getElementById("mainContent").innerHTML =
      `<div class="loading">❌ Gagal memuat data.<br><span style="font-size:12px">Pastikan Google Sheet diset akses publik</span></div>`;
  }
}

loadData();
</script>
</body>
</html>

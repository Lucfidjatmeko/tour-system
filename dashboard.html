<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Monitoring Tour</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --blue: #58a6ff; --green: #3fb950; --red: #f85149; --orange: #db8e33; --text: #c9d1d9; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        .header { text-align: center; margin-bottom: 30px; border-bottom: 1px solid #30363d; padding-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: var(--card); border: 1px solid #30363d; padding: 20px; border-radius: 12px; position: relative; }
        .card h3 { margin: 0; font-size: 14px; color: #8b949e; text-transform: uppercase; }
        .card .value { font-size: 36px; font-weight: bold; margin: 10px 0; display: block; }
        .progress-container { background: #30363d; height: 10px; border-radius: 5px; margin: 10px 0; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--green); width: 0%; transition: width 1s ease-in-out; }
        .status-row { display: flex; justify-content: space-between; font-size: 14px; }
        .highlight { border: 2px solid var(--blue); }
        .badge { position: absolute; top: 10px; right: 10px; background: var(--blue); color: white; padding: 2px 8px; border-radius: 10px; font-size: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 id="eventTitle">Loading Tour...</h1>
            <p id="eventLocation" style="color: var(--blue); margin: 5px 0;">Menghubungkan ke database...</p>
        </div>

        <div class="grid">
            <div class="card">
                <h3>Progress Respons</h3>
                <span class="value" id="percentText">0%</span>
                <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
                <div class="status-row">
                    <span id="respondedCount">0 Respon</span>
                    <span id="targetTotal">Target: 0</span>
                </div>
            </div>
            <div class="card">
                <h3>Kehadiran Karyawan</h3>
                <div style="margin-top: 15px;">
                    <div style="color: var(--green)">IKUT: <b id="confirm">0</b></div>
                    <div style="color: var(--orange)">PENDING: <b id="pending">0</b></div>
                    <div style="color: var(--red)">TIDAK: <b id="no">0</b></div>
                </div>
            </div>
            <div class="card">
                <h3>Logistik & Bus</h3>
                <span class="value" id="totalPax">0</span>
                <span id="selfDriveText" style="font-size: 13px;">0 Pax Kendaraan Sendiri</span>
            </div>
        </div>

        <h2>Voting Tanggal Tour</h2>
        <div id="dateGrid" class="grid"></div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbw6dArxe_HJ7Ww7p6oxDBvi64kpPixUQ2vMSv7noYuEK3LN5wY7M-e2JbgrtumqONdH/exec";

        async function fetchData() {
            try {
                const response = await fetch(GAS_URL + "?action=getSummary");
                const data = await response.json();
                updateUI(data);
            } catch (error) {
                console.error("Error:", error);
            }
        }

        function updateUI(data) {
            document.getElementById('eventTitle').innerText = data.eventName;
            document.getElementById('eventLocation').innerText = "Tujuan: " + data.lokasi;
            document.getElementById('confirm').innerText = data.confirm;
            document.getElementById('pending').innerText = data.pending;
            document.getElementById('no').innerText = data.no;
            document.getElementById('totalPax').innerText = data.totalPax + " Pax";
            document.getElementById('selfDriveText').innerText = data.selfDrive + " Pax Kendaraan Sendiri";

            // Update Progress
            const total = data.confirm + data.pending + data.no;
            const responded = data.confirm + data.no;
            const percent = Math.round((responded / total) * 100) || 0;
            document.getElementById('percentText').innerText = percent + "%";
            document.getElementById('progressBar').style.width = percent + "%";
            document.getElementById('respondedCount').innerText = responded + " Merespons";
            document.getElementById('targetTotal').innerText = "Target: " + total;

            // Update Dates
            const dateGrid = document.getElementById('dateGrid');
            dateGrid.innerHTML = '';
            const maxVote = Math.max(...Object.values(data.dateVotes));

            for (const [date, vote] of Object.entries(data.dateVotes)) {
                const isWinner = vote === maxVote && vote > 0;
                dateGrid.innerHTML += `
                    <div class="card ${isWinner ? 'highlight' : ''}">
                        ${isWinner ? '<span class="badge">FAVORIT</span>' : ''}
                        <h3>${date}</h3>
                        <span class="value">${vote} <small style="font-size:16px">Vote</small></span>
                    </div>
                `;
            }
        }

        fetchData();
        setInterval(fetchData, 30000); // Auto-refresh setiap 30 detik
    </script>
</body>
</html>
